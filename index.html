<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM Tool Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --main: #d32f2f; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 550px; margin: auto; background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 25px; }
        h2 { color: var(--main); text-align: center; margin-top: 0; }
        .search-box { width: 100%; padding: 14px; margin: 15px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .cat-title { background: #444; color: white; padding: 10px; font-size: 13px; font-weight: bold; margin-top: 20px; border-radius: 6px; text-transform: uppercase; }
        .tool-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        .tool-item input { width: 22px; height: 22px; margin-right: 15px; accent-color: var(--main); }
        .btn-gen { width: 100%; padding: 18px; background: var(--main); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 25px; }
        
        #summary-box { display: none; margin-top: 30px; border-radius: 12px; overflow: hidden; border: 1px solid #ccc; background: white; }
        .summary-header { background: #222; color: #fff; padding: 15px; text-align: center; font-weight: bold; }
        #output-text { white-space: pre-wrap; font-family: 'Courier New', monospace; font-size: 14px; padding: 20px; margin: 0; color: #333; }
        
        .summary-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; background: #f9f9f9; border-top: 1px solid #eee; }
        .action-btn { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-align: center; font-size: 14px; }
        .copy-btn { background: #007bff; color: white; }
        .pdf-btn { background: #198754; color: white; }
        .reset-btn { background: #6c757d; color: white; grid-column: span 2; }
    </style>
</head>
<body>

<div class="container">
    <h2>PM TOOL PORTAL</h2>
    <input type="text" id="engine" style="width:100%; padding:12px; border:1px solid #ccc; border-radius:8px;" placeholder="Engine Unit / Model No.">
    <input type="text" id="search" class="search-box" placeholder="🔍 Search tool name..." onkeyup="filterTools()">

    <div id="tool-container">Loading tools...</div>

    <button class="btn-gen" onclick="generate()">Generate Requisition</button>

    <div id="summary-box">
        <div class="summary-header">OFFICIAL TOOL REQUISITION</div>
        <pre id="output-text"></pre>
        <div class="summary-actions">
            <button class="action-btn copy-btn" onclick="copy()">Copy Text</button>
            <button class="action-btn pdf-btn" onclick="exportPDF()">Export PDF</button>
            <button class="action-btn reset-btn" onclick="location.reload()">Start New Request</button>
        </div>
    </div>
</div>

<script>
    let tools = [];
    const { jsPDF } = window.jspdf;

    async function init() {
        try {
            const response = await fetch('tools.json');
            tools = await response.json();
            render();
        } catch(e) { console.error("Could not load tools.json"); }
    }

    function render() {
        const container = document.getElementById('tool-container');
        const groups = tools.reduce((acc, t) => {
            (acc[t.category] = acc[t.category] || []).push(t);
            return acc;
        }, {});

        let html = '';
        for (const cat in groups) {
            html += `<div class="cat-title">${cat}</div>`;
            groups[cat].forEach(t => {
                html += `<label class="tool-item" data-name="${t.name.toLowerCase()}">
                            <input type="checkbox" value="${t.name}" data-cat="${cat}"> ${t.name}
                         </label>`;
            });
        }
        container.innerHTML = html;
    }

    function filterTools() {
        const query = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.tool-item').forEach(item => {
            item.style.display = item.getAttribute('data-name').includes(query) ? 'flex' : 'none';
        });
    }

    function generate() {
        const engine = document.getElementById('engine').value || "Not Specified";
        const selected = document.querySelectorAll('input:checked');
        if (selected.length === 0) return alert("Select tools first!");

        let res = `ENGINE UNIT: ${engine.toUpperCase()}\n`;
        res += `DATE: ${new Date().toLocaleString()}\n`;
        res += `--------------------------------\n`;
        
        let curCat = "";
        selected.forEach(cb => {
            let cat = cb.getAttribute('data-cat');
            if (cat !== curCat) {
                curCat = cat;
                res += `\n[${curCat.toUpperCase()}]\n`;
            }
            res += ` - ${cb.value}\n`;
        });

        document.getElementById('output-text').innerText = res;
        document.getElementById('summary-box').style.display = 'block';
        document.getElementById('summary-box').scrollIntoView({ behavior: 'smooth' });
    }

    function exportPDF() {
        const doc = new jsPDF();
        const content = document.getElementById('output-text').innerText;
        const engineName = document.getElementById('engine').value || "Tool_Request";

        // PDF Styling
        doc.setFont("helvetica", "bold");
        doc.setFontSize(18);
        doc.setTextColor(211, 47, 47); // Red color
        doc.text("TOOL REQUISITION REPORT", 20, 20);

        doc.setFont("courier", "normal");
        doc.setFontSize(11);
        doc.setTextColor(0, 0, 0); // Black
        
        // Handle long text wrapping
        const splitText = doc.splitTextToSize(content, 170);
        doc.text(splitText, 20, 35);

        doc.save(`Request_${engineName.replace(/\s+/g, '_')}.pdf`);
    }

    function copy() {
        navigator.clipboard.writeText(document.getElementById('output-text').innerText);
        alert("Text copied to clipboard!");
    }
    init();
</script>

</body>
</html>
